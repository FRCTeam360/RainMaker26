name: Python Script Tests

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  python-tests:
    name: Python Script Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run tests
        working-directory: scripts
        run: python -m unittest discover -v -s tests -p "test_*.py"
